name: eslint-config-jest@CD

permissions:
  contents: read
  id-token: write

on:
  push:
    branches-ignore:
      - "**"
    tags:
      - "eslint-config-sc-jest/v*"

env:
  WORKING_DIRECTORY: ./packages/eslint-config-jest

jobs:
  check-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - uses: actions/checkout@v4

      - name: check publish
        uses: ./.github/actions/check-publish

  pre-check-lint:
    needs: [check-publish]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - uses: actions/checkout@v4

      - name: setup
        uses: ./.github/actions/setup-single-node-version

      - name: Run bootstrap
        run: pnpm bootstrap

      - name: Run lint
        run: pnpm lint

  pre-check-spell-check:
    needs: [check-publish]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - uses: actions/checkout@v4

      - name: setup
        uses: ./.github/actions/setup-single-node-version

      - name: Run bootstrap
        run: pnpm bootstrap

      - name: Run spell-check
        run: pnpm spell-check

  pre-check-type-check:
    needs: [check-publish]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - uses: actions/checkout@v4

      - name: setup
        uses: ./.github/actions/setup-single-node-version

      - name: Run bootstrap
        run: pnpm bootstrap

      - name: Run type-check
        run: pnpm type-check

  pre-check-dry-run:
    needs: [check-publish]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    strategy:
      matrix:
        node-version: [22.x, 24.x, 26.x]
    steps:
      - uses: actions/checkout@v4

      - name: setup
        uses: ./.github/actions/setup-matrix-node-versions

      - name: Run bootstrap
        run: pnpm bootstrap

      - name: Run dry run
        run: pnpm dry-run

  publish:
    needs:
      [
        check-publish,
        pre-check-lint,
        pre-check-spell-check,
        pre-check-type-check,
        pre-check-dry-run,
      ]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - uses: actions/checkout@v4

      - name: setup
        uses: ./.github/actions/setup-single-node-version

      - name: publish
        uses: ./.github/actions/publish
        with:
          working-directory: ${{ env.WORKING_DIRECTORY }}
