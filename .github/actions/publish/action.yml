inputs:
  npm-token:
    required: true
  working-directory:
    required: true

runs:
  using: composite
  steps:
    - name: Run prepare
      run: pnpm prepare
      working-directory: ${{ inputs.working-directory }}
      shell: bash

    - run: corepack enable
      shell: bash

    - name: Build
      run: pnpm build
      working-directory: ${{ inputs.working-directory }}
      shell: bash

    - name: Publish
      run: pnpm publish
      working-directory: ${{ inputs.working-directory }}
      env:
        NPM_AUTH_TOKEN: ${{ inputs.npm-token }}
      shell: bash
