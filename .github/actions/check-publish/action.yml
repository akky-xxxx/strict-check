runs:
  using: composite
  steps:
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: ./.node-version

    - run: corepack enable
      shell: bash

    - name: Install npm for publishing
      run: npm install -g npm@^11.5.1
      shell: bash

    - name: Can publish
      run: pnpm dlx can-npm-publish --verbose
      shell: bash
